name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-ca-certificates

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build
          key: build-${{ hashFiles('CMakeLists.txt', 'tests/CMakeLists.txt') }}

      - name: Configure
        shell: msys2 {0}
        run: cmake -B build -G Ninja

      - name: Build
        shell: msys2 {0}
        run: cmake --build build

      - name: Test
        shell: msys2 {0}
        run: ctest --test-dir build --output-on-failure -E "IBGEDatabaseIntegration"
